<body>
<h1>3D Sloth - CSE 160 Assignment 2</h1>

<canvas id="webgl" width="540" height="540" style="display:block; border:1px solid black;"></canvas>
<div id="fpsDisplay">FPS: --</div>

<hr>

<p><b>Global Rotation</b></p>
<label>Rotate Y: <input type="range" id="s_gry" min="-180" max="180" value="0"> <span id="v_gry">0</span>&deg;</label><br>

<label>Upper Arm (shoulder): <input type="range" id="s_flua" min="-90" max="90" value="0"> <span id="v_flua">0</span>&deg;</label><br>
<label>Lower Arm (elbow):    <input type="range" id="s_flla" min="-90" max="90" value="0"> <span id="v_flla">0</span>&deg;</label><br>
<label>Claw/Hand (wrist):    <input type="range" id="s_flc"  min="-60" max="60" value="0"> <span id="v_flc">0</span>&deg;</label><br>

<p><b>Front Right Arm (3-level chain: shoulder &rarr; elbow &rarr; claw)</b></p>
<label>Upper Arm (shoulder): <input type="range" id="s_frua" min="-90" max="90" value="0"> <span id="v_frua">0</span>&deg;</label><br>
<label>Lower Arm (elbow):    <input type="range" id="s_frla" min="-90" max="90" value="0"> <span id="v_frla">0</span>&deg;</label><br>
<label>Claw/Hand (wrist):    <input type="range" id="s_frc"  min="-60" max="60" value="0"> <span id="v_frc">0</span>&deg;</label><br>

<hr>

<p><b>Back Legs</b></p>
<label>Left Upper Leg:  <input type="range" id="s_blul" min="-60" max="60" value="0"> <span id="v_blul">0</span>&deg;</label><br>
<label>Left Lower Leg:  <input type="range" id="s_blll" min="-60" max="60" value="0"> <span id="v_blll">0</span>&deg;</label><br>
<label>Right Upper Leg: <input type="range" id="s_brul" min="-60" max="60" value="0"> <span id="v_brul">0</span>&deg;</label><br>
<label>Right Lower Leg: <input type="range" id="s_brll" min="-60" max="60" value="0"> <span id="v_brll">0</span>&deg;</label><br>

<hr>

<button id="animBtn">Start Animation</button>
<button id="resetBtn">Reset</button>
<br><br>
<i>Drag the canvas to rotate. Shift+Click on the canvas to poke the sloth.</i>

<script>
// ============================================================
//  VERTEX SHADER
//  gl_Position = u_GlobalRotation * u_ModelMatrix * a_Position
// ============================================================
const VSHADER_SOURCE = `
  attribute vec4 a_Position;
  uniform mat4 u_ModelMatrix;
  uniform mat4 u_GlobalRotation;
  void main() {
    gl_Position = u_GlobalRotation * u_ModelMatrix * a_Position;
  }
`;

// ============================================================
//  FRAGMENT SHADER — flat color via uniform
// ============================================================
const FSHADER_SOURCE = `
  precision mediump float;
  uniform vec4 u_Color;
  void main() {
    gl_FragColor = u_Color;
  }
`;

// ============================================================
//  MATRIX4 — column-major (WebGL convention)
// ============================================================
class Matrix4 {
  constructor() {
    this.elements = new Float32Array(16);
    this.setIdentity();
  }
  setIdentity() {
    const e = this.elements;
    e[0]=1; e[4]=0; e[8]=0;  e[12]=0;
    e[1]=0; e[5]=1; e[9]=0;  e[13]=0;
    e[2]=0; e[6]=0; e[10]=1; e[14]=0;
    e[3]=0; e[7]=0; e[11]=0; e[15]=1;
    return this;
  }
  set(m) {
    for (let i = 0; i < 16; i++) this.elements[i] = m.elements[i];
    return this;
  }
  multiply(other) {
    const a = this.elements, b = other.elements;
    const r = new Float32Array(16);
    for (let i = 0; i < 4; i++)
      for (let j = 0; j < 4; j++) {
        let s = 0;
        for (let k = 0; k < 4; k++) s += a[i + k*4] * b[k + j*4];
        r[i + j*4] = s;
      }
    this.elements = r;
    return this;
  }
  translate(x, y, z) {
    const t = new Matrix4();
    t.elements[12] = x; t.elements[13] = y; t.elements[14] = z;
    return this.multiply(t);
  }
  scale(x, y, z) {
    const s = new Matrix4();
    s.elements[0] = x; s.elements[5] = y; s.elements[10] = z;
    return this.multiply(s);
  }
  rotate(angleDeg, x, y, z) {
    const rad = angleDeg * Math.PI / 180;
    const c = Math.cos(rad), s = Math.sin(rad);
    const len = Math.sqrt(x*x + y*y + z*z);
    if (len < 1e-9) return this;
    x /= len; y /= len; z /= len;
    const r = new Matrix4();
    const e = r.elements;
    e[0]  = c + x*x*(1-c);      e[4]  = x*y*(1-c) - z*s;  e[8]  = x*z*(1-c) + y*s;
    e[1]  = y*x*(1-c) + z*s;    e[5]  = c + y*y*(1-c);    e[9]  = y*z*(1-c) - x*s;
    e[2]  = z*x*(1-c) - y*s;    e[6]  = z*y*(1-c) + x*s;  e[10] = c + z*z*(1-c);
    return this.multiply(r);
  }
}

// ============================================================
//  GLOBALS
// ============================================================
let gl, canvas;
let a_Position, u_ModelMatrix, u_GlobalRotation, u_Color;
let cubeVBO, cylinderVBO, cylinderCount;

let gRotX = 0, gRotY = 0;
let g_mouseDown = false, g_lastMX = 0, g_lastMY = 0;
let g_mouseDX = 0, g_mouseDY = 0;

let g_flUpperArm = 0, g_flLowerArm = 0, g_flClaw = 0;
let g_frUpperArm = 0, g_frLowerArm = 0, g_frClaw = 0;
let g_blUpperLeg = 0, g_blLowerLeg = 0;
let g_brUpperLeg = 0, g_brLowerLeg = 0;

let g_animOn = false;
let g_time = 0;
let g_prevTS = null;
let g_poking = false;
let g_pokeTime = 0;
let g_fpsFrames = 0, g_fpsAccum = 0;

const C_BODY  = [0.50, 0.40, 0.30, 1.0];
const C_LIGHT = [0.70, 0.58, 0.44, 1.0];
const C_DARK  = [0.28, 0.20, 0.13, 1.0];
const C_FACE  = [0.82, 0.72, 0.60, 1.0];
const C_EYE   = [0.08, 0.06, 0.04, 1.0];
const C_NOSE  = [0.15, 0.08, 0.05, 1.0];
const C_CLAW  = [0.10, 0.08, 0.05, 1.0];
const C_BELLY = [0.78, 0.68, 0.54, 1.0];

// ============================================================
//  SHADER HELPERS
// ============================================================
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    throw new Error('Shader error: ' + gl.getShaderInfoLog(s));
  return s;
}
function linkProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS))
    throw new Error('Link error: ' + gl.getProgramInfoLog(p));
  return p;
}

// ============================================================
//  BUILD GEOMETRY BUFFERS — done ONCE at startup for performance
// ============================================================
function initBuffers() {
  const CV = [
    -0.5,-0.5, 0.5,  0.5,-0.5, 0.5,  0.5, 0.5, 0.5,
    -0.5,-0.5, 0.5,  0.5, 0.5, 0.5, -0.5, 0.5, 0.5,
    -0.5,-0.5,-0.5, -0.5, 0.5,-0.5,  0.5, 0.5,-0.5,
    -0.5,-0.5,-0.5,  0.5, 0.5,-0.5,  0.5,-0.5,-0.5,
    -0.5, 0.5,-0.5, -0.5, 0.5, 0.5,  0.5, 0.5, 0.5,
    -0.5, 0.5,-0.5,  0.5, 0.5, 0.5,  0.5, 0.5,-0.5,
    -0.5,-0.5,-0.5,  0.5,-0.5,-0.5,  0.5,-0.5, 0.5,
    -0.5,-0.5,-0.5,  0.5,-0.5, 0.5, -0.5,-0.5, 0.5,
     0.5,-0.5,-0.5,  0.5, 0.5,-0.5,  0.5, 0.5, 0.5,
     0.5,-0.5,-0.5,  0.5, 0.5, 0.5,  0.5,-0.5, 0.5,
    -0.5,-0.5,-0.5, -0.5,-0.5, 0.5, -0.5, 0.5, 0.5,
    -0.5,-0.5,-0.5, -0.5, 0.5, 0.5, -0.5, 0.5,-0.5,
  ];
  cubeVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, cubeVBO);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(CV), gl.STATIC_DRAW);

  // CYLINDER — non-cube primitive
  const SEGS = 16;
  const cylData = [];
  for (let i = 0; i < SEGS; i++) {
    const a0 = (i / SEGS) * 2 * Math.PI;
    const a1 = ((i + 1) / SEGS) * 2 * Math.PI;
    const x0 = 0.5*Math.cos(a0), z0 = 0.5*Math.sin(a0);
    const x1 = 0.5*Math.cos(a1), z1 = 0.5*Math.sin(a1);
    cylData.push(x0,-0.5,z0, x1,-0.5,z1, x1,0.5,z1);
    cylData.push(x0,-0.5,z0, x1,0.5,z1,  x0,0.5,z0);
    cylData.push(0,0.5,0, x0,0.5,z0, x1,0.5,z1);
    cylData.push(0,-0.5,0, x1,-0.5,z1, x0,-0.5,z0);
  }
  cylinderCount = cylData.length / 3;
  cylinderVBO = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, cylinderVBO);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(cylData), gl.STATIC_DRAW);
}

function drawCube(M, color) {
  gl.uniform4fv(u_Color, color);
  gl.uniformMatrix4fv(u_ModelMatrix, false, M.elements);
  gl.bindBuffer(gl.ARRAY_BUFFER, cubeVBO);
  gl.vertexAttribPointer(a_Position, 3, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(a_Position);
  gl.drawArrays(gl.TRIANGLES, 0, 36);
}

function drawCylinder(M, color) {
  gl.uniform4fv(u_Color, color);
  gl.uniformMatrix4fv(u_ModelMatrix, false, M.elements);
  gl.bindBuffer(gl.ARRAY_BUFFER, cylinderVBO);
  gl.vertexAttribPointer(a_Position, 3, gl.FLOAT, false, 0, 0);
  gl.enableVertexAttribArray(a_Position);
  gl.drawArrays(gl.TRIANGLES, 0, cylinderCount);
}

// ============================================================
//  updateAnimationAngles() — kept SEPARATE from renderScene()
// ============================================================
let aBody=0,aHead=0,aFLU=0,aFLL=0,aFLC=0,aFRU=0,aFRL=0,aFRC=0,aBLU=0,aBLL=0,aBRU=0,aBRL=0;

function updateAnimationAngles(dt) {
  if (g_animOn) g_time += dt;
  if (g_poking) g_pokeTime += dt;

  aBody=aHead=aFLU=aFLL=aFLC=aFRU=aFRL=aFRC=aBLU=aBLL=aBRU=aBRL=0;

  if (g_animOn && !g_poking) {
    const t = g_time;
    aBody = Math.sin(t*0.8)*3;
    aHead = Math.sin(t*0.5)*12;
    aFLU  = Math.sin(t*1.2)*20;
    aFLL  = Math.sin(t*1.2+0.7)*25;
    aFLC  = Math.sin(t*1.5)*14;
    aFRU  = Math.sin(t*1.2+Math.PI)*20;
    aFRL  = Math.sin(t*1.2+Math.PI+0.7)*25;
    aFRC  = Math.sin(t*1.5+Math.PI)*14;
    aBLU  = Math.sin(t*1.0)*15;
    aBLL  = Math.sin(t*1.0+0.4)*18;
    aBRU  = Math.sin(t*1.0+Math.PI)*15;
    aBRL  = Math.sin(t*1.0+Math.PI+0.4)*18;
  }

  if (g_poking) {
    const pt = g_pokeTime;
    const d = Math.exp(-pt*2.5);
    aHead = Math.sin(pt*14)*40*d;
    aFLU  = Math.sin(pt*10+0.5)*55*d;
    aFRU  = -Math.sin(pt*10)*55*d;
    aFLL  = Math.sin(pt*12)*40*d;
    aFRL  = -Math.sin(pt*12)*40*d;
    aFLC  = Math.sin(pt*16)*30*d;
    aFRC  = -Math.sin(pt*16)*30*d;
    if (pt > 2.8) { g_poking=false; g_pokeTime=0; }
  }
}

// ============================================================
//  renderScene() — ALL drawing happens here
//
//  HOW JOINTS STAY CONNECTED (matrix hierarchy):
//  Every part has an "anchor" matrix = position + rotation only (no scale).
//  To draw the part: copy anchor, then translate to center of bone, then scale.
//  A child's anchor = parent anchor + translate to tip of parent + child rotation.
//  This way child joints always inherit parent motion without shearing.
// ============================================================
function renderScene() {
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // Global rotation — passed to vertex shader as u_GlobalRotation
  const GR = new Matrix4();
  GR.rotate(gRotX + g_mouseDY, 1, 0, 0);
  GR.rotate(gRotY + g_mouseDX, 0, 1, 0);
  gl.uniformMatrix4fv(u_GlobalRotation, false, GR.elements);

  // ---- BODY ----
  const bodyAnchor = new Matrix4().rotate(aBody, 0, 0, 1);
  drawCube(new Matrix4().set(bodyAnchor).scale(0.40, 0.26, 0.30), C_BODY);
  drawCube(new Matrix4().set(bodyAnchor).translate(0.20,0,0).scale(0.01,0.20,0.22), C_BELLY);

  // ---- HEAD ----
  const headAnchor = new Matrix4().set(bodyAnchor).translate(0.28,0.07,0).rotate(aHead,0,1,0);

  // Main head cube
  drawCube(new Matrix4().set(headAnchor).scale(0.18,0.17,0.20), C_LIGHT);

  // Dark fur mask — wide band across eyes (sloths have a distinctive dark eye mask)
  drawCube(new Matrix4().set(headAnchor).translate(0.072,0.038,0).scale(0.042,0.048,0.210), C_DARK);

  // Face muzzle — a protruding box on the lower front of the face
  // This gives the snout some depth instead of a flat face
  drawCube(new Matrix4().set(headAnchor).translate(0.098,-0.018,0).scale(0.040,0.060,0.110), C_FACE);

  // Nose — sits on top of muzzle, wider and flatter than before
  drawCube(new Matrix4().set(headAnchor).translate(0.113,0.010,0).scale(0.022,0.022,0.060), C_NOSE);

  // Left eye white (slightly behind the mask, peeking through)
  drawCube(new Matrix4().set(headAnchor).translate(0.083,0.038,0.062).scale(0.032,0.032,0.032), C_FACE);
  // Left pupil (dark dot on top)
  drawCube(new Matrix4().set(headAnchor).translate(0.093,0.038,0.060).scale(0.016,0.020,0.020), C_EYE);

  // Right eye white
  drawCube(new Matrix4().set(headAnchor).translate(0.083,0.038,-0.062).scale(0.032,0.032,0.032), C_FACE);
  // Right pupil
  drawCube(new Matrix4().set(headAnchor).translate(0.093,0.038,-0.060).scale(0.016,0.020,0.020), C_EYE);

  // Mouth area — a small darker box below the muzzle (the characteristic sloth "smile")
  drawCube(new Matrix4().set(headAnchor).translate(0.100,-0.044,0).scale(0.028,0.018,0.072), C_DARK);

  // Chin — pale patch below mouth
  drawCube(new Matrix4().set(headAnchor).translate(0.094,-0.058,0).scale(0.030,0.014,0.060), C_FACE);

  // Ear left — small cube nub sticking out from the side of the head
  drawCube(new Matrix4().set(headAnchor).translate(0.000,0.068,0.098).scale(0.060,0.040,0.028), C_LIGHT);
  // Ear right
  drawCube(new Matrix4().set(headAnchor).translate(0.000,0.068,-0.098).scale(0.060,0.040,0.028), C_LIGHT);

  // ============================================================
  //  FRONT LEFT ARM — 3-level chain
  //  Level 1 (shoulder): rotated by slider g_flUpperArm
  //  Level 2 (elbow):    inherits shoulder, rotated by g_flLowerArm
  //  Level 3 (wrist):    inherits elbow, rotated by g_flClaw — CYLINDER
  // ============================================================
  const flShoulderAnchor = new Matrix4().set(bodyAnchor)
    .translate(0.15,0.11,0.16).rotate(g_flUpperArm+aFLU,0,0,1);
  drawCube(new Matrix4().set(flShoulderAnchor).translate(0,-0.115,0).scale(0.08,0.24,0.08), C_LIGHT);

  const flElbowAnchor = new Matrix4().set(flShoulderAnchor)
    .translate(0,-0.24,0).rotate(g_flLowerArm+aFLL,0,0,1);
  drawCube(new Matrix4().set(flElbowAnchor).translate(0,-0.095,0).scale(0.07,0.21,0.07), C_DARK);

  const flWristAnchor = new Matrix4().set(flElbowAnchor)
    .translate(0,-0.20,0).rotate(g_flClaw+aFLC,1,0,0);
  drawCylinder(new Matrix4().set(flWristAnchor).translate(0,-0.06,0).scale(0.06,0.13,0.06), C_CLAW);

  // ---- FRONT RIGHT ARM (mirror) ----
  const frShoulderAnchor = new Matrix4().set(bodyAnchor)
    .translate(0.15,0.11,-0.16).rotate(g_frUpperArm+aFRU,0,0,1);
  drawCube(new Matrix4().set(frShoulderAnchor).translate(0,-0.115,0).scale(0.08,0.24,0.08), C_LIGHT);

  const frElbowAnchor = new Matrix4().set(frShoulderAnchor)
    .translate(0,-0.24,0).rotate(g_frLowerArm+aFRL,0,0,1);
  drawCube(new Matrix4().set(frElbowAnchor).translate(0,-0.095,0).scale(0.07,0.21,0.07), C_DARK);

  const frWristAnchor = new Matrix4().set(frElbowAnchor)
    .translate(0,-0.20,0).rotate(g_frClaw+aFRC,1,0,0);
  drawCylinder(new Matrix4().set(frWristAnchor).translate(0,-0.06,0).scale(0.06,0.13,0.06), C_CLAW);

  // ---- BACK LEFT LEG — 2-level chain ----
  const blHipAnchor = new Matrix4().set(bodyAnchor)
    .translate(-0.15,-0.10,0.14).rotate(g_blUpperLeg+aBLU,0,0,1);
  drawCube(new Matrix4().set(blHipAnchor).translate(0,-0.105,0).scale(0.085,0.23,0.085), C_LIGHT);

  const blKneeAnchor = new Matrix4().set(blHipAnchor)
    .translate(0,-0.23,0).rotate(g_blLowerLeg+aBLL,0,0,1);
  drawCube(new Matrix4().set(blKneeAnchor).translate(0,-0.095,0).scale(0.075,0.21,0.075), C_DARK);

  // ---- BACK RIGHT LEG (mirror) ----
  const brHipAnchor = new Matrix4().set(bodyAnchor)
    .translate(-0.15,-0.10,-0.14).rotate(g_brUpperLeg+aBRU,0,0,1);
  drawCube(new Matrix4().set(brHipAnchor).translate(0,-0.105,0).scale(0.085,0.23,0.085), C_LIGHT);

  const brKneeAnchor = new Matrix4().set(brHipAnchor)
    .translate(0,-0.23,0).rotate(g_brLowerLeg+aBRL,0,0,1);  // FIXED: was g_brUpperLeg
  drawCube(new Matrix4().set(brKneeAnchor).translate(0,-0.095,0).scale(0.075,0.21,0.075), C_DARK);
}

// ============================================================
//  tick() — main loop
// ============================================================
function tick(timestamp) {
  if (g_prevTS === null) g_prevTS = timestamp;
  const dt = (timestamp - g_prevTS) / 1000.0;
  g_prevTS = timestamp;

  updateAnimationAngles(dt);

  g_fpsFrames++;
  g_fpsAccum += dt;
  if (g_fpsAccum >= 0.5) {
    document.getElementById('fpsDisplay').textContent =
      'FPS: ' + Math.round(g_fpsFrames / g_fpsAccum);
    g_fpsFrames = 0; g_fpsAccum = 0;
  }

  renderScene();
  requestAnimationFrame(tick);
}

function bindSlider(sliderId, displayId, setter) {
  const el = document.getElementById(sliderId);
  el.addEventListener('input', () => {
    const v = parseFloat(el.value);
    setter(v);
    document.getElementById(displayId).textContent = Math.round(v);
  });
}

function resetAll() {
  gRotX=gRotY=0;
  g_flUpperArm=g_flLowerArm=g_flClaw=0;
  g_frUpperArm=g_frLowerArm=g_frClaw=0;
  g_blUpperLeg=g_blLowerLeg=0;
  g_brUpperLeg=g_brLowerLeg=0;
  g_mouseDX=g_mouseDY=0;
  ['s_gry','s_grx','s_flua','s_flla','s_flc','s_frua','s_frla','s_frc',
   's_blul','s_blll','s_brul','s_brll'].forEach(id => document.getElementById(id).value=0);
  ['v_gry','v_grx','v_flua','v_flla','v_flc','v_frua','v_frla','v_frc',
   'v_blul','v_blll','v_brul','v_brll'].forEach(id => document.getElementById(id).textContent='0');
}

function main() {
  canvas = document.getElementById('webgl');
  gl = canvas.getContext('webgl');
  if (!gl) { alert('WebGL not supported.'); return; }

  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0.8, 0.85, 0.9, 1.0);

  const vs = compileShader(gl.VERTEX_SHADER,   VSHADER_SOURCE);
  const fs = compileShader(gl.FRAGMENT_SHADER, FSHADER_SOURCE);
  const prog = linkProgram(vs, fs);
  gl.useProgram(prog);

  a_Position       = gl.getAttribLocation(prog,  'a_Position');
  u_ModelMatrix    = gl.getUniformLocation(prog, 'u_ModelMatrix');
  u_GlobalRotation = gl.getUniformLocation(prog, 'u_GlobalRotation');
  u_Color          = gl.getUniformLocation(prog, 'u_Color');

  initBuffers();
  gl.uniformMatrix4fv(u_GlobalRotation, false, new Matrix4().elements);

  bindSlider('s_gry','v_gry',   v => gRotY=v);
  bindSlider('s_grx','v_grx',   v => gRotX=v);
  bindSlider('s_flua','v_flua', v => g_flUpperArm=v);
  bindSlider('s_flla','v_flla', v => g_flLowerArm=v);
  bindSlider('s_flc','v_flc',   v => g_flClaw=v);
  bindSlider('s_frua','v_frua', v => g_frUpperArm=v);
  bindSlider('s_frla','v_frla', v => g_frLowerArm=v);
  bindSlider('s_frc','v_frc',   v => g_frClaw=v);
  bindSlider('s_blul','v_blul', v => g_blUpperLeg=v);
  bindSlider('s_blll','v_blll', v => g_blLowerLeg=v);
  bindSlider('s_brul','v_brul', v => g_brUpperLeg=v);
  bindSlider('s_brll','v_brll', v => g_brLowerLeg=v);

  document.getElementById('animBtn').addEventListener('click', () => {
    g_animOn = !g_animOn;
    document.getElementById('animBtn').textContent = g_animOn ? 'Stop Animation' : 'Start Animation';
  });
  document.getElementById('resetBtn').addEventListener('click', resetAll);

  canvas.addEventListener('mousedown', e => {
    if (e.shiftKey) { g_poking=true; g_pokeTime=0; return; }
    g_mouseDown=true; g_lastMX=e.clientX; g_lastMY=e.clientY;
  });
  canvas.addEventListener('mousemove', e => {
    if (!g_mouseDown) return;
    g_mouseDX += (e.clientX-g_lastMX)*0.45;
    g_mouseDY += (e.clientY-g_lastMY)*0.45;
    g_lastMX=e.clientX; g_lastMY=e.clientY;
  });
  canvas.addEventListener('mouseup',    () => g_mouseDown=false);
  canvas.addEventListener('mouseleave', () => g_mouseDown=false);

  requestAnimationFrame(tick);
}

main();
</script>
</body>
</html>
